# OpenClaw Guard 环境变量配置 - 1Panel 专用
# 已预填你的 1Panel 实际路径，直接可用

# ============================================
# 1Panel 路径配置（已填好，无需修改）
# ============================================

# 主配置目录（容器内 /home/node/.openclaw）
OPENCLAW_DATA_DIR=/opt/1panel/apps/openclaw/openclaw/data/conf

# 工作区目录（容器内 /home/node/.openclaw/workspace）
OPENCLAW_WORKSPACE_DIR=/opt/1panel/apps/openclaw/openclaw/data/workspace

# ============================================
# 基础配置
# ============================================
TZ=Asia/Shanghai
GUARD_ENABLED=true

# ============================================
# 告警通知配置（至少配一个，不配也能用）
# ============================================
# 飞书机器人 Webhook
ALERT_WEBHOOK_FEISHU=

# 钉钉机器人 Webhook
ALERT_WEBHOOK_DINGTALK=

# Slack Webhook
ALERT_WEBHOOK_SLACK=

# 告警级别阈值 (info/warning/error/critical)
ALERT_LEVEL_THRESHOLD=warning

# ============================================
# 备份配置
# ============================================
# 增量快照保留时间（小时）
BACKUP_RETENTION_HOURS=48

# 备份压缩（true/false）
BACKUP_COMPRESS=false

# ============================================
# Git 版本控制
# ============================================
GIT_AUTO_COMMIT=true
GIT_COMMIT_INTERVAL=5

# ============================================
# 调试选项
# ============================================
DEBUG=false
LOG_LEVEL=info
